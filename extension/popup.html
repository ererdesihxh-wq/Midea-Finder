<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 420px; font: 14px -apple-system, sans-serif; background: #f0f4f8; color: #1a1a2e; }
.header { background: linear-gradient(135deg,#1e40af,#3b82f6); color: #fff; padding: 14px 16px; text-align: center; }
.header h1 { font-size: 18px; }
.header p { font-size: 11px; opacity: .75; margin-top: 2px; }
#results { padding: 10px 14px; }
.item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px; margin-bottom: 6px;
  background: #fff; border-radius: 10px;
  border: 1px solid #e5e7eb; cursor: pointer;
  transition: all .15s;
}
.item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); border-color: #3b82f6; }
.item:active { transform: scale(.98); }
.icon {
  width: 38px; height: 38px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.info { flex: 1; min-width: 0; }
.name { font-weight: 600; font-size: 13px; }
.hint { font-size: 11px; color: #6b7280; margin-top: 1px; }
.badge { font-size: 12px; font-weight: 600; white-space: nowrap; }
.badge-ok { color: #16a34a; }
.badge-err { color: #dc2626; }
.badge-link { color: #3b82f6; }
.badge-unknown { color: #9ca3af; }
.ts { text-align: center; padding: 8px; font-size: 10px; color: #9ca3af; border-top: 1px solid #e5e7eb; background: #fff; }
.loading { text-align: center; padding: 40px; color: #6b7280; }
.loading .sp { display: inline-block; width: 24px; height: 24px; border: 3px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin .6s linear infinite; margin-bottom: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
footer { text-align: center; padding: 8px; font-size: 10px; color: #9ca3af; }
</style>
</head>
<body>

<div class="header">
  <h1>❄️ Midea PortaSplit</h1>
  <p>各建材店库存 · 自动更新</p>
</div>

<div id="results">
  <div class="loading">
    <div class="sp"></div>
    <div>正在获取最新库存...</div>
  </div>
</div>

<footer>数据每 30 分钟自动更新 · 点击门店打开页面</footer>

<script src="popup.js"></script>
</body>
</html>
