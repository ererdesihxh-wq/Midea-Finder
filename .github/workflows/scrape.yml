name: 检查 Midea PortaSplit 库存

on:
  schedule:
    # 每 30 分钟跑一次（和 braucheklima.de 差不多频率）
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 也可以手动触发
  push:
    branches: [main]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 用 Node.js 运行爬虫
        run: node scraper/index.js

      - name: 提交结果到仓库
        run: |
          git config user.name "midea-finder-bot"
          git config user.email "bot@localhost"
          git add docs/results.json
          git diff --staged --quiet || git commit -m "🔄 库存更新 $(date '+%Y-%m-%d %H:%M')"
          git push
