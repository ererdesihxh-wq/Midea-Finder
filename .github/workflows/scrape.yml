name: 检查 Midea PortaSplit 库存

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行爬虫
        run: node scraper/index.js

      - name: 提交结果
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "midea-finder-bot"
          git config user.email "bot@localhost"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add docs/results.json
          git diff --staged --quiet || git commit -m "🔄 库存更新 $(date '+%Y-%m-%d %H:%M')"
          git push
